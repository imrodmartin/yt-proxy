<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drupal YouTube Channels — DrupalHelps.com</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
    --accent: #4f8ef7; --accent-light: #6ba3f9;
    --text: #e8eaf0; --muted: #8b8fa8;
    --success: #4caf7d; --warning: #f5a623; --red: #e05c5c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',sans-serif; padding: 24px 20px; min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; }
  .eyebrow { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 26px; font-weight: 800; }
  .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; margin-bottom: 28px; }
  .view-toggle { display: flex; gap: 8px; }
  .view-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .channel-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .rank-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .thumb { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .ch-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-link { color: var(--accent); font-size: 12px; text-decoration: none; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--bg); border-radius: 8px; padding: 10px 12px; text-align: center; }
  .stat-val { font-size: 18px; font-weight: 700; }
  .stat-label { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .toggle-videos { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; margin-bottom: 0; }
  .videos-list { margin-top: 10px; }
  .video-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .video-row:last-child { border-bottom: none; }
  .video-thumb { width: 80px; height: 45px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .video-title { color: var(--text); font-size: 13px; font-weight: 600; text-decoration: none; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .video-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .card-footer { color: var(--muted); font-size: 12px; margin-top: 12px; }
  .loading-banner { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 10px 14px; color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  th.active { color: var(--accent); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .text-right { text-align: right; }
  .footer { margin-top: 32px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">DrupalHelps.com</div>
  <h1>Drupal YouTube Channels</h1>
  <p class="subtitle">Live data via YouTube Data API v3</p>

  <div id="channelsSection" style="display:none">
    <div class="toolbar">
      <span id="trackingLabel" style="color:var(--muted);font-size:14px"></span>
      <div class="view-toggle">
        <button class="view-btn active" id="btnCards" onclick="setView('cards')">Cards</button>
        <button class="view-btn" id="btnTable" onclick="setView('table')">Table</button>
      </div>
    </div>
    <div id="cardsView" class="grid"></div>
    <div id="tableView" style="display:none; background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden;">
      <table>
        <thead>
          <tr>
            <th class="text-right" onclick="sortBy('rank')">#</th>
            <th>Channel</th>
            <th class="text-right active" onclick="sortBy('subscriberCount')">Subscribers <span id="sortIndicator">v</span></th>
            <th class="text-right" onclick="sortBy('viewCount')">Total Views</th>
            <th class="text-right" onclick="sortBy('videoCount')">Videos</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="loadingState" class="loading-banner">Loading channels…</div>
  <div id="errorState" style="display:none; margin-top:16px;"></div>

  <div class="footer">DrupalHelps.com</div>
</div>

<script>
const PROXY = '/api/youtube';
const HANDLES = ['webwash','DrupalAssociation','DriesBuytaert','drupaleasy','drupal_ai','freelygive','EvolvingWeb','DrupalHelps','AcquiaTV'];

let channels = [];
let currentView = 'cards';
let sortKey = 'subscriberCount';
let sortDir = 'desc';
let expandedCards = {};
let expandedTopCards = {};
let topVideosCache = {};

const fmt = n => {
  if (!n && n !== 0) return '—';
  const num = parseInt(n);
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
  if (num >= 1_000) return (num / 1_000).toFixed(1) + 'K';
  return num.toLocaleString();
};

const fmtDate = iso => {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

async function fetchChannel(handle) {
  const res = await fetch(`${PROXY}?handle=${encodeURIComponent(handle)}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Lookup failed.');
  return data;
}

async function init() {
  const results = await Promise.allSettled(HANDLES.map(fetchChannel));
  const errors = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') channels.push(r.value);
    else errors.push(`@${HANDLES[i]}: ${r.reason?.message || r.reason}`);
  });
  document.getElementById('loadingState').style.display = 'none';
  if (errors.length) {
    const el = document.getElementById('errorState');
    el.style.display = 'block';
    el.innerHTML = `<div style="background:#1a1d27;border:1px solid #e05c5c;border-radius:10px;padding:16px;color:#e05c5c;font-size:13px;"><strong>Errors loading channels:</strong><ul style="margin-top:8px;padding-left:20px">${errors.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
  }
  render();
}

function toggleVideos(id) {
  expandedCards[id] = !expandedCards[id];
  render();
}

async function toggleTopVideos(id) {
  expandedTopCards[id] = !expandedTopCards[id];
  if (expandedTopCards[id] && !topVideosCache[id]) {
    topVideosCache[id] = 'loading';
    render();
    try {
      const res = await fetch(`${PROXY}?topVideos=true&id=${id}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load top videos.');
      topVideosCache[id] = data;
    } catch(e) {
      topVideosCache[id] = e;
    }
  }
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('cardsView').style.display = v === 'cards' ? 'grid' : 'none';
  document.getElementById('tableView').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('btnCards').className = 'view-btn' + (v === 'cards' ? ' active' : '');
  document.getElementById('btnTable').className = 'view-btn' + (v === 'table' ? ' active' : '');
}

function sortBy(key) {
  if (sortKey === key) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortKey = key; sortDir = 'desc'; }
  render();
}

function render() {
  if (!channels.length) return;
  document.getElementById('channelsSection').style.display = 'block';
  document.getElementById('trackingLabel').textContent = `${channels.length} channel${channels.length !== 1 ? 's' : ''} tracked`;

  const sorted = [...channels].sort((a, b) => {
    const va = parseInt(a[sortKey]) || 0, vb = parseInt(b[sortKey]) || 0;
    return sortDir === 'desc' ? vb - va : va - vb;
  });

  document.getElementById('cardsView').innerHTML = sorted.map((ch, i) => `
    <div class="channel-card">
      <div class="card-head">
        <div class="rank-badge">#${i+1}</div>
        ${ch.thumbnail ? `<img class="thumb" src="${ch.thumbnail}" alt="">` : ''}
        <div style="overflow:hidden">
          <div class="ch-title">${ch.title}</div>
          <a class="ch-link" href="https://youtube.com/channel/${ch.id}" target="_blank">View on YouTube</a>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" style="color:var(--accent-light)">${fmt(ch.subscriberCount)}</div><div class="stat-label">Subscribers</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--success)">${fmt(ch.viewCount)}</div><div class="stat-label">Total Views</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--warning)">${fmt(ch.videoCount)}</div><div class="stat-label">Videos</div></div>
      </div>
      ${ch.videos?.length ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0">
          <button class="toggle-videos" onclick="toggleVideos('${ch.id}')">${expandedCards[ch.id] ? 'Hide recent videos' : 'Show last 5 videos'}</button>
          <button class="toggle-videos" onclick="toggleTopVideos('${ch.id}')">${expandedTopCards[ch.id] ? 'Hide top videos' : 'Top videos'}</button>
        </div>
        ${expandedCards[ch.id] ? `<div class="videos-list">${ch.videos.map(v => `
          <div class="video-row">
            <a href="${v.url}" target="_blank"><img class="video-thumb" src="${v.thumbnail}" alt=""></a>
            <div style="flex:1;min-width:0">
              <a class="video-title" href="${v.url}" target="_blank">${v.title}</a>
              <div class="video-meta">${fmtDate(v.publishedAt)} &nbsp;|&nbsp; <span style="color:var(--success)">${fmt(v.viewCount)} views</span> &nbsp;|&nbsp; <span style="color:var(--warning)">${fmt(v.commentCount)} comments</span></div>
            </div>
          </div>`).join('')}</div>` : ''}
        ${expandedTopCards[ch.id] ? (() => {
          const tv = topVideosCache[ch.id];
          if (tv === 'loading') return '<div style="color:var(--muted);font-size:13px;margin-top:8px">Loading…</div>';
          if (tv instanceof Error) return `<div style="color:var(--red);font-size:13px;margin-top:8px">${tv.message}</div>`;
          if (Array.isArray(tv) && tv.length) return `<div class="videos-list">${tv.map(v => `
            <div class="video-row">
              <a href="${v.url}" target="_blank"><img class="video-thumb" src="${v.thumbnail}" alt=""></a>
              <div style="flex:1;min-width:0">
                <a class="video-title" href="${v.url}" target="_blank">${v.title}</a>
                <div class="video-meta">${fmtDate(v.publishedAt)} &nbsp;|&nbsp; <span style="color:var(--success)">${fmt(v.viewCount)} views</span> &nbsp;|&nbsp; <span style="color:var(--warning)">${fmt(v.commentCount)} comments</span></div>
              </div>
            </div>`).join('')}</div>`;
          if (Array.isArray(tv)) return '<div style="color:var(--muted);font-size:13px;margin-top:8px">No videos found in the past year.</div>';
          return '';
        })() : ''}
      ` : ''}
      <div class="card-footer">${ch.country ? `Country: <span style="color:var(--text)">${ch.country}</span>` : ''}</div>
    </div>
  `).join('');

  document.getElementById('tableBody').innerHTML = sorted.map((ch, i) => `
    <tr>
      <td class="text-right" style="color:var(--muted)">${i+1}</td>
      <td style="font-weight:500">${ch.title}</td>
      <td class="text-right" style="color:var(--accent-light);font-weight:600">${fmt(ch.subscriberCount)}</td>
      <td class="text-right" style="color:var(--success)">${fmt(ch.viewCount)}</td>
      <td class="text-right" style="color:var(--warning)">${fmt(ch.videoCount)}</td>
    </tr>
  `).join('');

  setView(currentView);
}

init();
</script>
</body>
</html>
